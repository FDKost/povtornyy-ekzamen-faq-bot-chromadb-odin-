version: "3.8"

services:
  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data

  api:
    build: .
    container_name: faq_bot_api
    depends_on:
      - chroma
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=/data
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    ports:
      - "8001:8000"

volumes:
  chroma_data:
